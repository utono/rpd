# sudo systemctll enable keyd && sudo systemctl start keyd
# github.com: path:keyd/default.conf

[ids]

*

[main]

# Maps capslock to escape when pressed and control when held.
capslock = overload(meta, esc)
a = overloadt(meta, a, 200)
# s = overloadt(shift, s, 200)
s = overloadt(control, s, 200)
d = overloadt(alt, d, 200)
j = overloadt(alt, j, 200)
k = overloadt(control, k, 200)
l = overloadt(shift, l, 200)
; = overloadt(meta, ;, 200)
# Remaps the escape key to capslock
# esc = capslock
